<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lançamento de Fluxo</title>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Novo Lançamento - Fluxo</h5>
            </div>
            <div class="card-body">
                <form id="formFluxo">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" id="data" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo</label>
                            <select id="tipo" class="form-select" required>
                                <option value="Receita">Receita</option>
                                <option value="Despesa">Despesa</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select id="categoria" class="form-select" required>
                            <option value="" selected disabled>Selecione uma categoria...</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Assinaturas">Assinaturas</option>
                            <option value="Benefícios">Benefícios</option>
                            <option value="Cartão de crédito">Cartão de crédito</option>
                            <option value="Educação">Educação</option>
                            <option value="Empréstimos">Empréstimos</option>
                            <option value="Investimentos">Investimentos</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Moradia">Moradia</option>
                            <option value="Renda extra">Renda extra</option>
                            <option value="Rendimentos de investimentos">Rendimentos de investimentos</option>
                            <option value="Reserva de emergência">Reserva de emergência</option>
                            <option value="Roupas">Roupas</option>
                            <option value="Salário">Salário</option>
                            <option value="Saúde">Saúde</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" id="descricao" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Forma de Pagamento</label>
                            <select id="pagamento" class="form-select" required>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Cartão de Crédito">Cartão de Crédito</option>
                                <option value="PIX (Transferência)">PIX (Transferência)</option>
                                <option value="Boleto">Boleto</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" id="btnEnviar" class="btn btn-success w-100">Lançar no Fluxo</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal de Sucesso -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Sucesso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Lançamento realizado com sucesso!
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
